server:
  port: ${SERVER_PORT:8081}

spring:
  cache:
    type: redis
  data:
    redis:
      time-to-live: 3600000 # 1 hour default expiration to prevent permanent cache leaks
  application:
    name: core-macroservice
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  datasource:
    # Read from environment variables (e.g., from .env file loaded in the environment), fallback to local PG credentials
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/batdongsan_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
  sql:
    init:
      mode: always
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # This tells Hibernate to automatically create schemas if they don't exist
        hbm2ddl.create_namespaces: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

# Modulith allows us to log events passing between modules
logging:
  level:
    org.springframework.modulith: DEBUG

# External Services Integration
cloudinary:
  cloud-name: ${CLOUD_NAME:default}
  api-key: ${CLOUDINARY_API_KEY:default}
  api-secret: ${CLOUDINARY_API_SECRET:default}

encryption:
  key: ${ENCRYPTION_KEY:default-encryption-key-32-chars!!!}

iam:
  service-url: ${IAM_SERVICE_URL:http://localhost:8084}

resilience4j:
  circuitbreaker:
    instances:
      iamUserValidation:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        ignoreExceptions:
          - com.se.bds.common.exception.BusinessException
      searchServiceCircuitBreaker:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
  retry:
    instances:
      searchServiceRetry:
        maxAttempts: 3
        waitDuration: 2000
  bulkhead:
    instances:
      pdfGenerationBulkhead:
        maxConcurrentCalls: 3
        maxWaitDuration: 100ms
      reportExportBulkhead:
        maxConcurrentCalls: 2
        maxWaitDuration: 100ms
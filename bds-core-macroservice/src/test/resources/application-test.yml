# Test-specific configurations
spring:
  main:
    allow-bean-definition-overriding: true
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false

# Disable or Mock External Services for Testing
cloudinary:
  cloud-name: test-cloud
  api-key: test-key
  api-secret: test-secret

logging:
  level:
    root: INFO
    com.se.bds.core: DEBUG

iam:
  service-url: http://localhost:8081/mock/iam


# ==========================================
# SERVER CONFIGURATION
# port to 8085 for Appointment Service
# ==========================================
server.port=${SERVER_PORT:8085}
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/}
server.servlet.encoding.enabled=true
server.servlet.encoding.charset=UTF-8
server.forward-headers-strategy=framework
server.address=${SERVER_ADDRESS:0.0.0.0}

# ==========================================
# APP CONFIGURATION (JWT & Base Configs)
# ==========================================
app.secret=${APP_SECRET:ZHsZNROzM5wAx3dpg5XHhX+wycM7+m1Tnqxbzgfddf8=}
app.jwt.token.expires-in=${APP_JWT_TOKEN_EXPIRES_IN:10800000}
app.jwt.refresh-token.expires-in=${APP_JWT_REFRESH_TOKEN_EXPIRES_IN:86400000}
app.default-locale=${APP_DEFAULT_LOCALE:vi}
app.default-timezone=${APP_DEFAULT_TIMEZONE:UTC}
app.url=${APP_URL:http://localhost:8085}

# ==========================================
# EUREKA DISCOVERY CLIENT
# ==========================================
eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# ==========================================
# SPRING APPLICATION
# ==========================================
spring.application.name=${APP_NAME:appointment-service}
spring.application.description=${APP_DESCRIPTION:Appointment Service for BatDongScam}

# ==========================================
# DATABASE (POSTGRESQL)
# ??i host m?c ??nh t? 'postgres' thÃ nh 'localhost' ?? ch?y local
# ==========================================
spring.datasource.url=jdbc:postgresql://${POSTGRESQL_HOST:localhost}:${POSTGRESQL_EXTERNAL_PORT:5432}/${POSTGRESQL_DB:bds-appointment-service-db}?options=-c%20timezone=UTC
spring.datasource.username=${POSTGRESQL_USER:postgres}
spring.datasource.password=${POSTGRESQL_PASSWORD:123}
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==========================================
# SPRING WEB & MULTIPART
# ==========================================
spring.data.web.pageable.default-page-size=${PAGEABLE_DEFAULT_PAGE_SIZE:20}
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:50MB}

# ==========================================
# I18N, MESSAGES & JACKSON
# ==========================================
spring.messages.basename=locales.messages
spring.messages.encoding.charset=UTF-8
spring.messages.encoding.enabled=true
spring.messages.encoding.force-encoding=true
spring.http.encoding.force-encoding=true
spring.jackson.mapper.accept-case-insensitive-enums=true

# ==========================================
# SWAGGER / SPRINGDOC
# ==========================================
springdoc.api-docs.enabled=${API_DOCS_ENABLED:true}
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.path=${SWAGGER_PATH:/swagger-ui}
springdoc.show-actuator=true

# ==========================================
# LOGGING
# ==========================================
# MONGODB (for ranking schemas)
# ==========================================
spring.data.mongodb.uri=mongodb://${MONGODB_HOST:localhost}:${MONGODB_PORT:27017}/${MONGODB_DB:bds-ranking-db}
spring.data.mongodb.auto-index-creation=true

# ==========================================
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.org.hibernate.type=${LOGGING_LEVEL_HIBERNATE:INFO}
logging.level.org.springframework.web=${LOGGING_LEVEL_SPRING:INFO}

# ==========================================
# KAFKA CONFIGURATION
# ==========================================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer


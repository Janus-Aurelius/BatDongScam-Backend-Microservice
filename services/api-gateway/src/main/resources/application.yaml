server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            # Search Service
            - id: search-service
              uri: ${SEARCH_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/search/**

            # Notification Service
            - id: notification-service
              uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/notifications/**

            # Core Macroservice - catch all remaining paths
            - id: core-service
              uri: ${CORE_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/**

          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:3000"
                  - "http://localhost:5173"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - PATCH
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
                exposedHeaders:
                  - Authorization

app:
  secret: ${APP_SECRET:BatDongScamSecretKeyForJWTTokenAtLeast256BitsLong!!}
  public-paths:
    - /public/**
    - /auth/**
    - /api-docs/**
    - /swagger-ui/**
    - /webjars/**
    - /webhooks/**
    - /actuator/**
    - /api/search/**

logging:
  level:
    root: INFO
    com.se100.bds.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG

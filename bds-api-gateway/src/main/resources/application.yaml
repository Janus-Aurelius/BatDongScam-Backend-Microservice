server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      httpclient:
        connect-timeout: 3000
        response-timeout: 10000
      routes:
        # Search Service
        - id: search-service
          uri: lb://search-service
          predicates:
            - Path=/api/search/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                key-resolver: "#{@ipOrUserKeyResolver}"
        # Notification Service
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                key-resolver: "#{@ipOrUserKeyResolver}"
        # IAM Service Login & Register (Highly restricted)
        - id: iam-service-auth
          uri: lb://iam-service
          predicates:
            - Path=/api/auth/login, /api/auth/register
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@ipOrUserKeyResolver}"
        # IAM Service General
        - id: iam-service-general
          uri: lb://iam-service
          predicates:
            - Path=/api/auth/**, /api/users/**, /api/account/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                key-resolver: "#{@ipOrUserKeyResolver}"
        # Appointment Service
        - id: appointment-service
          uri: lb://appointment-service
          predicates:
            - Path=/api/appointment/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                key-resolver: "#{@ipOrUserKeyResolver}"
        # Financial Service
        - id: financial-service
          uri: lb://financial-service
          predicates:
            - Path=/api/payments/**, /api/commissions/**, /webhooks/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                key-resolver: "#{@ipOrUserKeyResolver}"
        # Moderation Service
        - id: moderation-service
          uri: lb://moderation-service
          predicates:
            - Path=/api/violations/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                key-resolver: "#{@ipOrUserKeyResolver}"
        # Core Macroservice (Catch all)
        - id: core-service
          uri: lb://core-macroservice
          predicates:
            - Path=/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                key-resolver: "#{@ipOrUserKeyResolver}"
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            exposedHeaders:
              - Authorization

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

app:
  secret: ${APP_SECRET:BatDongScamSecretKeyForJWTTokenAtLeast256BitsLong!!}
  jwks-uri: ${JWKS_URI:http://localhost:8084/api/auth/jwks}
  public-paths:
    - /
    - /assets/**
    - /ws/**
    - /debug/**
    - /bookings/payment/**
    - /public/**
    - /auth/**
    - /api/auth/**
    - /api-docs/**
    - /v3/api-docs/**
    - /swagger-ui/**
    - /swagger-ui.html
    - /webjars/**
    - /webhooks/**
    - /actuator/**
    - /api/search/**

logging:
  level:
    root: INFO
    com.se100.bds.gateway: DEBUG
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG
    org.springframework.web.reactive: DEBUG
    reactor.netty: DEBUG

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health, info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: IAM Service
        url: /api/auth/v3/api-docs
      - name: Financial Service
        url: /api/payments/v3/api-docs
      - name: Appointment Service
        url: /api/appointment/v3/api-docs
      - name: Moderation Service
        url: /api/violations/v3/api-docs
      - name: Notification Service
        url: /api/notifications/v3/api-docs
      - name: Search Service
        url: /api/search/v3/api-docs
      - name: Core Service
        url: /v3/api-docs

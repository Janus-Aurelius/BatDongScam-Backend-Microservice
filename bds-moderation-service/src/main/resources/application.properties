server.port=${SERVER_PORT:8087}
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/}

eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

spring.application.name=${APP_NAME:moderation-service}
spring.application.description=${APP_DESCRIPTION:Moderation Service for BatDongScam}

spring.datasource.url=jdbc:postgresql://${POSTGRESQL_HOST:localhost}:${POSTGRESQL_EXTERNAL_PORT:5432}/${POSTGRESQL_DB:bds-moderation-service-db}?options=-c%20timezone%3DUTC
spring.datasource.username=${POSTGRESQL_USER:postgres}
spring.datasource.password=${POSTGRESQL_PASSWORD:123}
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

spring.data.web.pageable.default-page-size=${PAGEABLE_DEFAULT_PAGE_SIZE:20}
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:50MB}
spring.jackson.mapper.accept-case-insensitive-enums=true

springdoc.api-docs.enabled=${API_DOCS_ENABLED:true}
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.path=${SWAGGER_PATH:/swagger-ui}

logging.level.root=${LOGGING_LEVEL_ROOT:INFO}

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/bds_moderation}

# Kafka Configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dummy}
cloudinary.api-key=${CLOUDINARY_API_KEY:dummy}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:dummy}
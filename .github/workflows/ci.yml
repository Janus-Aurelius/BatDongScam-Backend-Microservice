name: Java CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Initialize PostgreSQL databases
        run: |
          # Create all required databases for the microservices
          docker exec ${{ job.services.postgres.id }} psql -U postgres -c "CREATE DATABASE \"bds-financial-service-db\";"
          docker exec ${{ job.services.postgres.id }} psql -U postgres -c "CREATE DATABASE \"bds-appointment-service-db\";"
          docker exec ${{ job.services.postgres.id }} psql -U postgres -c "CREATE DATABASE \"bds-moderation-service-db\";"
          docker exec ${{ job.services.postgres.id }} psql -U postgres -c "CREATE DATABASE \"bds-iam-service-db\";"
          docker exec ${{ job.services.postgres.id }} psql -U postgres -c "CREATE DATABASE \"bds\";"

      - name: Build and compile application
        run: mvn -B clean compile test-compile

      - name: Run test suites (including Integration Tests)
        run: mvn -B test
